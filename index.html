<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Fluxhook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-body-tertiary">

<div class="container-fluid main-container">
  <!-- HEADER -->
  <div class="header-section">
    <div class="d-flex justify-content-between align-items-center">
      <h3><i class="bi bi-webhook"></i> Fluxhook</h3>
      <div class="btn-group" role="group">
        <button class="btn btn-outline-info btn-sm" id="multiModeToggle" data-i18n-title="header.multiModeTooltip">
          <i class="bi bi-stack"></i> <span data-i18n="header.multiMode">Multi Mode</span>
        </button>
        <button class="btn btn-outline-primary btn-sm" id="importJsonBtn">
          <i class="bi bi-box-arrow-in-down"></i> <span data-i18n="header.importJson">Import JSON</span>
        </button>
        <button class="btn btn-outline-primary btn-sm" id="exportJson">
          <i class="bi bi-box-arrow-up"></i> <span data-i18n="header.exportJson">Export JSON</span>
        </button>
        <button class="btn btn-outline-secondary btn-sm" id="themeToggle">
          <i class="bi bi-circle-half"></i> <span data-i18n="header.theme">Theme</span>
        </button>
        <select class="form-select form-select-sm language-selector" id="languageSelector">
          <option value="en">English</option>
          <option value="pt-BR">Português (Brasil)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Painel de Grupo de Mensagens (oculto por padrão) -->
  <div id="queuePanel" class="queue-panel-section" style="display: none;">
    <div class="row g-3">
      <div class="col-12">
        <div class="card shadow-sm queue-panel-card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="bi bi-stack"></i> <span data-i18n="queuePanel.title">Message Group</span> (<span id="queueCount">0</span>)</h6>
            <div>
              <button class="btn btn-sm btn-success" id="sendAllBtn">
                <i class="bi bi-send-fill"></i> <span data-i18n="queuePanel.sendAll">Send All</span>
              </button>
              <button class="btn btn-sm btn-outline-primary" id="addToQueueBtn">
                <i class="bi bi-plus-lg"></i> <span data-i18n="queuePanel.addToQueue">Add to Group</span>
              </button>
              <button class="btn btn-sm btn-outline-danger" id="clearQueueBtn">
                <i class="bi bi-trash"></i> <span data-i18n="queuePanel.clearQueue">Clear Group</span>
              </button>
            </div>
          </div>
          <div class="card-body queue-panel-body">
            <div class="mb-3">
              <label class="form-label fw-bold"><i class="bi bi-link-45deg"></i> <span data-i18n="queuePanel.webhookLabel">Webhook URL (all messages in the group will be sent to this webhook)</span></label>
              <input type="text" id="queueWebhookUrl" class="form-control" data-i18n-placeholder="queuePanel.webhookPlaceholder">
            </div>
            <hr>
            <div id="queueContainer" class="queue-container"></div>
            <div id="queueProgress" style="display: none;" class="mt-3">
              <div class="d-flex justify-content-between mb-2">
                <small data-i18n="queuePanel.sending">Sending...</small>
                <small id="progressText">0/0</small>
              </div>
              <div class="progress">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3 content-row">

    <!-- EDITOR -->
    <div class="col-lg-6 editor-column">
      <div class="card shadow-sm editor-card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-pencil-square"></i> <span data-i18n="editor.title">Editor</span></h6>
        </div>
        <div class="card-body editor-card-body">
          <!-- Card de Configurações -->
          <div class="card shadow-sm mb-3">
            <div class="card-header">
              <h6 class="mb-0"><i class="bi bi-gear"></i> <span data-i18n="editor.settings">Settings</span></h6>
            </div>
            <div class="card-body">
              <div class="mb-3" id="webhookUrlSection">
                <label class="form-label" data-i18n="editor.webhookUrl">Webhook URL</label>
                <input type="text" id="webhookUrl" class="form-control" data-i18n-placeholder="editor.webhookUrlPlaceholder">
              </div>

              <div class="mb-3">
                <label class="form-label" data-i18n="editor.username">Username</label>
                <input type="text" id="username" class="form-control" data-i18n-placeholder="editor.usernamePlaceholder" oninput="updatePreview()">
              </div>

              <div class="mb-3">
                <label class="form-label" data-i18n="editor.avatarUrl">Avatar URL</label>
                <input type="text" id="avatar" class="form-control" data-i18n-placeholder="editor.avatarUrlPlaceholder" oninput="updatePreview()">
              </div>

              <div class="mb-3">
                <label class="form-label" data-i18n="editor.message">Message</label>
                <textarea id="content" class="form-control" rows="3" oninput="updatePreview()"></textarea>
              </div>
            </div>
          </div>

          <!-- Card de Embeds -->
          <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h6 class="mb-0"><i class="bi bi-card-text"></i> <span data-i18n="editor.embeds">Embeds</span></h6>
              <button class="btn btn-primary btn-sm" id="addEmbed">
                <i class="bi bi-plus-lg"></i> <span data-i18n="editor.addEmbed">Add Embed</span>
              </button>
            </div>
            <div class="card-body">
              <div id="embedsContainer"></div>
            </div>
          </div>

          <!-- Botões de ação -->
          <div class="d-grid gap-2 mt-3">
            <div class="d-flex gap-2">
              <button class="btn btn-success flex-grow-1" id="sendBtn">
                <i class="bi bi-send"></i> <span data-i18n="editor.sendWebhook">Send Webhook</span>
              </button>
              <button class="btn btn-warning" id="cancelEditBtn" style="display: none;">
                <i class="bi bi-x-lg"></i> <span data-i18n="editor.cancel">Cancel</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="col-lg-6 preview-column">
      <div class="card shadow-sm preview-card">
        <div class="card-header">
          <h6 class="mb-0"><i class="bi bi-eye"></i> <span data-i18n="preview.title">Preview</span></h6>
        </div>
        <div class="card-body discord-preview">
          <div id="preview"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="i18n.js"></script>
<script type="module" src="init-discord.js"></script>
<script src="app.js"></script>

<script>
  // Initialize i18n system
  (async function() {
    await i18n.init();
    
    // Apply translations to all elements with data-i18n attributes
    window.applyTranslations = function() {
      // Translate text content
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = i18n.t(key);
      });
      
      // Translate placeholders
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        el.placeholder = i18n.t(key);
      });
      
      // Translate titles
      document.querySelectorAll('[data-i18n-title]').forEach(el => {
        const key = el.getAttribute('data-i18n-title');
        el.title = i18n.t(key);
      });
    };
    
    // Apply initial translations
    applyTranslations();
    
    // Set up language selector
    const languageSelector = document.getElementById('languageSelector');
    if (languageSelector) {
      languageSelector.value = i18n.getLanguage();
      
      languageSelector.addEventListener('change', async (e) => {
        await i18n.changeLanguage(e.target.value);
        applyTranslations();
        
        // Trigger re-render of dynamic content
        if (typeof renderAllEmbeds === 'function') {
          renderAllEmbeds();
        }
        if (typeof updateQueueDisplay === 'function') {
          updateQueueDisplay();
        }
      });
    }
    
    // Listen for language changes
    window.addEventListener('languageChanged', () => {
      applyTranslations();
    });
  })();
</script>

</body>
</html>
